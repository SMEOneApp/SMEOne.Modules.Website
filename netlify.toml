[build]
  command = "prisma generate && react-scripts build"
  publish = "build"
  functions = "api"

[functions]
  included_files = ["api/email-templates/**"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
